info:
  name: TextSearchRequest
  type: http
  seq: 2

http:
  method: POST
  url: "{{ServerUrl}}"
  headers:
    - name: Content-Type
      value: application/xml
  body:
    type: xml
    data: |-
      <?xml version="1.0" encoding="UTF-8"?>
      <CreateTextSearchRequest
          xmlns="urn:veloconnect:search-1.5"
          xmlns:vct="urn:veloconnect:transaction-1.0">

        <vct:BuyersID>{{BuyersID}}</vct:BuyersID>
        <vct:Credential>
          <vct:Password>{{Password}}</vct:Password>
        </vct:Credential>

        <SearchText></SearchText>
      </CreateTextSearchRequest>
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "// TransactionID aus der XML-Antwort extrahieren und speichern\r

        const responseXML = JSON.stringify(res.getBody());\r

        const match = responseXML.match(/<vct:TransactionID>(.*?)<\\/vct:TransactionID>/);\r

        \r

        if (match) {\r

        \    bru.setEnvVar(\"TransactionID\", match[1]);\r

        \    console.log(\"TransactionID gesetzt:\", match[1]);\r

        } else {\r

        \    console.warn(\"Keine TransactionID gefunden.\");\r

        }"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
