opencollection: 1.0.0

info:
  name: Veloconnect
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: User-Agent
      value: DiBike Bruno Veloconnect collection

docs:
  content: |-
    # Collection of Veloconnect queries

    In order to use these queries, you will need the server URL, username (BuyersID) and password for the Veloconnect server.

    Please use collection environments to store these details.
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
