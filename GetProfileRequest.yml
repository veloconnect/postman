info:
  name: GetProfileRequest
  type: http
  seq: 1

http:
  method: POST
  url: "{{ServerUrl}}"
  headers:
    - name: Content-Type
      value: application/xml
  body:
    type: xml
    data: |-
      <?xml version="1.0" encoding="UTF-8"?>
      <GetProfileRequest xmlns="urn:veloconnect:profile-1.1"
          xmlns:vct="urn:veloconnect:transaction-1.0">
        <vct:BuyersID>{{BuyersID}}</vct:BuyersID>
        <vct:Credential>
          <vct:Password>{{Password}}</vct:Password>
        </vct:Credential>
        <IsTest>true</IsTest>
      </GetProfileRequest>
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
